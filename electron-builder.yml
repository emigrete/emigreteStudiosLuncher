# electron-builder — empaquetado base (Hito M0).
appId: studios.emigrete.caballeronetherite
productName: El Caballero de Netherite
copyright: © Emigrete Studios

directories:
  buildResources: build # icon.png (logo Emigrete) se toma de acá
  output: release

files:
  - out/**
  - package.json
  - "!**/*.map"

win:
  target: nsis
linux:
  target: AppImage
  category: Game

# Feed de auto-update (M4b): GitHub Releases, repo público (sin token en el cliente).
publish:
  provider: github
  owner: emigrete
  repo: emigreteStudiosLuncher
