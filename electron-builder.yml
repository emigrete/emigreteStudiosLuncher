# electron-builder — empaquetado base (Hito M0).
appId: studios.emigrete.caballeronetherite
productName: El Caballero de Netherite
copyright: © Emigrete Studios

directories:
  buildResources: build # icon.png (logo Emigrete) se toma de acá
